services:
  app:
    build: . # for now, split later if needed
    container_name: pilltracker-dev # WARNING: currently runs `npm run dev`
    ports:
      - "3000:3000"
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER:-.}:/app # make code edits visible immediately; uses the `LOCAL_WORKSPACE_FOLDER` env var set in devcontainer.json, or defaults to current directory if not set (e.g., when running outside of devcontainer)
      - app_node_modules:/app/node_modules # keep container-side dependencies separate from host filesystem
      - app_data:/data # persistent storage for SQLite DB
    environment:
      # Runtime
      NODE_ENV: development

      # App - Main SQLite persistence
      APP_DB_PATH: /data/pilltracker.sqlite
      APP_SQLITE_JOURNAL_MODE: wal

      # DevNotes
      DEV_NOTES_ENABLE: "true" #                        # opt, default: "false"
      # DEV_NOTES_ENABLE_IN_MEMORY: "true"              # opt, default: "true"
      # DEV_NOTES_IN_MEMORY_PATH: ":memory:"            # opt, default: :memory:
      # DEV_NOTES_IN_MEMORY_JOURNAL_MODE: "memory"      # opt, default: memory
      # DEV_NOTES_ENABLE_PERSISTENT: "true"             # opt, default: "true"
      DEV_NOTES_DB_PATH: /data/devnotes/devnotes.sqlite
      # DEV_NOTES_PERSISTENT_JOURNAL_MODE: "wal"        # opt, default: APP_SQLITE_JOURNAL_MODE

    command: npm run dev # replace with `npm start` for production

volumes:
  app_node_modules:
  app_data:
