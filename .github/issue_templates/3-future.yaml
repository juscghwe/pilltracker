name: Future idea
description: A future improvement or sidequest that should not block current MVP work.
type: future
title: "[Future]: "
assignees: 
  - juscghwe
body:
  - type: markdown
    attributes:
      value: |
        Use this for useful ideas that should be captured without interrupting the current implementation path.
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What should be considered later?
      placeholder: |
        - ...
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why this might be useful
      description: What problem could this solve or improve?
      placeholder: |
        - ...
  - type: textarea
    id: why-later
    attributes:
    label: Why this is not part of the current scope
    description: Why should this wait?
    placeholder: |
      - Not required for MVP
      - Needs more research
      - Depends on backend foundation
    validations:
      required: true
  - type: dropdown
    id: revisit-phase
    attributes:
      label: Suggested revisit phase
      options:
        - After backend foundation
        - After frontend foundation
        - Before MVP release
        - Before v1 planning
        - Before v2 planning
        - Unknown
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Links, sketches, examples or additional thoughts.
      placeholder: |
        - ...
