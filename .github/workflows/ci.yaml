name: Docker Foundation CI

on:
  pull_request:
    branches: 
      - main
      - milestone/m1

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      LOCAL_WORKSPACE_FOLDER: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: |
          docker compose config

      - name: Build app image
        run: |
          docker compose build

      - name: Validate npm dependencies
        run: |
          docker compose run --rm app npm list --depth=0
      
      - name: Validate source bind mount
        run: |
          docker compose run --rm app test -f /app/package.json "
            console.log('Source bind mount is correctly set');
          "

      - name: Validate environment variables
        run: |
          docker compose run --rm app node -e "
            if (!process.env.NODE_ENV !== 'development') {
              throw new Error('NODE_ENV is not set to development');
              process.exit(1);
            }

            if (process.env.DB_PATH !== '/data/pilltracker.sqlite') {
              throw new Error('DB_PATH is not set to /data/pilltracker.sqlite');
              process.exit(1);
            }

            console.log('Environment variables are correctly set');
          "

      - name: Validate data volume
        run: |
          docker compose run --rm app sh -c "
            echo 'test data' > /data/volume-check.txt
          "
          docker compose run --rm app sh -c "
            grep -qx 'test data' /data/volume-check.txt
          "

      - name: Cleanup Docker resources
        if: always()
        run: |
          docker compose down --volumes --remove-orphans
